<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本の管理システム</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { background-color: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; }
        .delete { background-color: #f44336; }
    </style>
</head>
<body>
    <h1>本の管理システム</h1>
    
    <a href="{{ url_for('add_book') }}" class="btn">新しい本を追加</a>
    
    <h2>本のリスト</h2>
    
    {% if books %}
    <table>
        <tr>
            <th>ID</th>
            <th>タイトル</th>
            <th>著者</th>
            <th>出版年</th>
            <th>操作</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.id }}</td>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.year }}</td>
            <td>
                <a href="{{ url_for('delete_book', book_id=book.id) }}" class="btn delete" 
                   onclick="return confirm('この本を削除しますか？')">削除</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>本がありません。</p>
    {% endif %}
</body>
</html>
