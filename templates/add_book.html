<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本を追加</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { max-width: 400px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; 
        }
        .btn { background-color: #4CAF50; color: white; padding: 10px 20px; 
               text-decoration: none; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .back { background-color: #ddd; color: black; }
    </style>
</head>
<body>
    <h1>新しい本を追加</h1>
    
    <form method="POST">
        <label for="title">タイトル:</label>
        <input type="text" id="title" name="title" required>
        
        <label for="author">著者:</label>
        <input type="text" id="author" name="author" required>
        
        <label for="year">出版年:</label>
        <input type="number" id="year" name="year" required>
        
        <br><br>
        <button type="submit" class="btn">追加</button>
        <a href="{{ url_for('index') }}" class="btn back">戻る</a>
    </form>
</body>
</html>
